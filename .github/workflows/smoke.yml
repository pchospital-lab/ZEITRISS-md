name: ZEITRISS CI Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci_smoke:
    name: ci_smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python3 -m unittest -q

      - name: Run smoke
        run: bash scripts/smoke.sh | tee smoke.log

      - name: Generate LINT catalog
        run: python3 scripts/generate_lint_catalog.py

      - name: Show LINT catalog diff (non-blocking)
        run: git diff -- docs/LINT-CATALOG.md --exit-code || true

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-smoke-logs
          path: |
            smoke.log
            docs/LINT-CATALOG.md
            .smoke/**/*
          retention-days: 7
