players:
  A_tactician:
    name: "Spieler A (Taktiker)"
    style: "Ergebnisorientiert, plant, will Würfel sehen, knapp, sachlich. Übernimmt oft Führung."
    rule_knowledge: "hoch"
    verbosity: "knapp"
  B_narrator:
    name: "Spieler B (Erzähler)"
    style: "Narrativ, will Szenen, Dialoge, Atmosphäre. Ausführlich, beschreibt oft was Charakter denkt/tut. Kollaborativ. Liebt die Poesie der Terminals und Datenströme — triggert Hacking-Aktionen gerne aus ästhetischen Gründen."
    rule_knowledge: "mittel"
    verbosity: "ausführlich"
  C_chaot:
    name: "Spieler C (Chaot)"
    style: "Impulsiv, probiert Dinge aus, macht auch Blödsinn. Kurz, frech, improvisiert. Fragt bei Regeln nach."
    rule_knowledge: "niedrig"
    verbosity: "kurz-frech"

